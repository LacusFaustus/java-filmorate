# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:file:./db/filmorate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SQL Initialization
# ===============================
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# ===============================
# H2 Console (Web Interface)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ===============================
# Application Specific Configuration
# ===============================
# Storage type: db (database) or memory (in-memory)
filmorate.storage.type=db

# ===============================
# Logging Configuration
# ===============================
logging.level.ru.yandex.practicum.filmorate=INFO
logging.level.org.springframework.jdbc.core=WARN
logging.level.org.springframework.jdbc.core.JdbcTemplate=WARN
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=WARN

# Application logs
logging.file.name=logs/filmorate.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Console logs
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# Jackson Configuration
# ===============================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.deserialization.FAIL_ON_UNKNOWN_PROPERTIES=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# Server Configuration
# ===============================
server.port=8080
server.servlet.context-path=/
server.error.include-stacktrace=never
server.error.include-message=always

# ===============================
# Spring Boot Specific
# ===============================
spring.main.banner-mode=off
spring.main.allow-bean-definition-overriding=true

# ===============================
# Validation Configuration
# ===============================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ??? ?????? - ????????? ???? ? ???????
spring.mvc.format.date=iso
